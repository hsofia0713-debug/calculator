<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海報輸出費用計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        .card-gradient {
            background: linear-gradient(135deg, #ffffff 0%, #f9fafb 100%);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="max-w-xl w-full">
        <!-- 主卡片容器 -->
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-white">
            <!-- 標題欄 -->
            <div class="bg-indigo-600 p-6 text-white text-center">
                <h1 class="text-2xl font-bold tracking-wider">海報輸出費用計算器</h1>
                <p class="text-indigo-100 text-sm mt-1">根據標準收費表自動換算</p>
            </div>

            <div class="p-8 card-gradient">
                <!-- 類型選擇 -->
                <div class="mb-6">
                    <label class="block text-sm font-bold text-slate-700 mb-2">請選擇海報類型</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="setType('general')" id="btn-general" class="type-btn active flex flex-col items-center justify-center p-4 rounded-xl border-2 transition-all duration-200 bg-indigo-50 border-indigo-500 text-indigo-700">
                            <span class="text-lg font-bold">一般海報</span>
                            <span class="text-xs opacity-70">A4 ~ 全開尺寸</span>
                        </button>
                        <button onclick="setType('medical')" id="btn-medical" class="type-btn flex flex-col items-center justify-center p-4 rounded-xl border-2 transition-all duration-200 border-slate-200 text-slate-500 hover:border-slate-300">
                            <span class="text-lg font-bold">醫學海報</span>
                            <span class="text-xs opacity-70">長幅大型海報</span>
                        </button>
                    </div>
                </div>

                <!-- 尺寸輸入區 -->
                <div class="grid grid-cols-2 gap-6 mb-8">
                    <div class="relative">
                        <label class="block text-sm font-bold text-slate-700 mb-2">寬度 (cm)</label>
                        <input type="number" id="width" placeholder="0" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all text-lg">
                    </div>
                    <div class="relative">
                        <label class="block text-sm font-bold text-slate-700 mb-2">長度 (cm)</label>
                        <input type="number" id="height" placeholder="0" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all text-lg">
                    </div>
                </div>

                <!-- 計算按鈕 -->
                <button onclick="calculate()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all active:scale-[0.98] mb-8 text-lg">
                    立即計算費用
                </button>

                <!-- 結果顯示區 (預設隱藏) -->
                <div id="result-box" class="hidden transform transition-all duration-300 scale-95 opacity-0">
                    <div class="bg-slate-900 rounded-2xl p-6 text-white relative overflow-hidden">
                        <!-- 背景裝飾 -->
                        <div class="absolute -right-8 -top-8 w-32 h-32 bg-indigo-500/20 rounded-full blur-3xl"></div>
                        
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">輸出規格</p>
                                <h3 id="res-spec" class="text-xl font-bold mt-1 text-indigo-300">---</h3>
                            </div>
                            <div class="text-right">
                                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">預估金額</p>
                                <p class="text-3xl font-black text-white mt-1">
                                    <span class="text-sm font-normal mr-1 text-slate-400">NT$</span><span id="res-price">0</span>
                                </p>
                            </div>
                        </div>

                        <div id="extra-detail" class="text-xs text-slate-400 border-t border-slate-800 pt-4 italic">
                            <!-- 顯示超材計算詳情 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 底部提醒 -->
            <div class="p-4 bg-slate-50 border-t border-slate-100 text-center">
                <p class="text-slate-400 text-xs">※ 最終報價以店內實際測量為準</p>
            </div>
        </div>
    </div>

    <script>
        let currentType = 'general';

        function setType(type) {
            currentType = type;
            const genBtn = document.getElementById('btn-general');
            const medBtn = document.getElementById('btn-medical');
            
            if(type === 'general') {
                genBtn.classList.add('bg-indigo-50', 'border-indigo-500', 'text-indigo-700');
                genBtn.classList.remove('border-slate-200', 'text-slate-500');
                medBtn.classList.remove('bg-indigo-50', 'border-indigo-500', 'text-indigo-700');
                medBtn.classList.add('border-slate-200', 'text-slate-500');
            } else {
                medBtn.classList.add('bg-indigo-50', 'border-indigo-500', 'text-indigo-700');
                medBtn.classList.remove('border-slate-200', 'text-slate-500');
                genBtn.classList.remove('bg-indigo-50', 'border-indigo-500', 'text-indigo-700');
                genBtn.classList.add('border-slate-200', 'text-slate-500');
            }
        }

        function calculate() {
            const w = parseFloat(document.getElementById('width').value);
            const h = parseFloat(document.getElementById('height').value);
            const resBox = document.getElementById('result-box');

            if (!w || !h || w <= 0 || h <= 0) {
                alert("請輸入有效的尺寸");
                return;
            }

            // 確保 shortSide 是短邊, longSide 是長邊
            const shortSide = Math.min(w, h);
            const longSide = Math.max(w, h);
            
            let price = 0;
            let specName = "";
            let detail = "";

            if (currentType === 'general') {
                // --- 一般海報邏輯 ---
                if (longSide <= 30 && shortSide <= 30) { 
                    price = 350; specName = "A4 規格 (30x30內)"; 
                } else if (longSide <= 45 && shortSide <= 30) { 
                    price = 400; specName = "A3 規格 (30x45內)"; 
                } else if (longSide <= 60 && shortSide <= 45) { 
                    price = 500; specName = "4開 規格 (45x60內)"; 
                } else if (longSide <= 90 && shortSide <= 60) { 
                    price = 600; specName = "對開 規格 (60x90內)"; 
                } else if (longSide <= 110 && shortSide <= 90) { 
                    price = 1000; specName = "全開 規格 (90x110內)"; 
                } else {
                    // 超出全開計算方式
                    const basePrice = 1000;
                    const areaCai = Math.ceil((w * h) / 900);
                    const baseCai = Math.ceil((90 * 110) / 900); // 11才
                    const extraCai = Math.max(0, areaCai - baseCai);
                    price = basePrice + (extraCai * 100);
                    specName = "超材輸出 (超出全開)";
                    detail = `面積約 ${areaCai} 才。計算：全開基本 1000 元 + 超過的部分 (${extraCai} 才 x 100元)。`;
                }
            } else {
                // --- 醫學海報邏輯 ---
                const medWidths = [90, 110];
                const medHeights = [150, 180, 210, 240];
                const medPriceMap = {
                    90: { 150: 1000, 180: 1300, 210: 1600, 240: 1900 },
                    110: { 150: 1500, 180: 1900, 210: 2300, 240: 2700 }
                };

                let targetW = medWidths.find(tw => shortSide <= tw);
                let targetH = medHeights.find(th => longSide <= th);

                if (targetW && targetH) {
                    price = medPriceMap[targetW][targetH];
                    specName = `醫學海報級距 (${targetW}x${targetH})`;
                    detail = `符合醫學海報標準規格級距。`;
                } else {
                    // 超出 110x240
                    const basePrice = 2700;
                    const areaCai = Math.ceil((w * h) / 900);
                    const maxStandardCai = Math.ceil((110 * 240) / 900); // 30才
                    const extraCai = Math.max(0, areaCai - maxStandardCai);
                    price = basePrice + (extraCai * 100);
                    specName = "大型醫學海報 (超規)";
                    detail = `面積約 ${areaCai} 才。計算：最大級距 2700 元 + 超過的部分 (${extraCai} 才 x 100元)。`;
                }
            }

            // 顯示結果
            document.getElementById('res-spec').innerText = specName;
            document.getElementById('res-price').innerText = price.toLocaleString();
            document.getElementById('extra-detail').innerText = detail || "符合標準收費表規格。";
            
            resBox.classList.remove('hidden');
            setTimeout(() => {
                resBox.classList.remove('scale-95', 'opacity-0');
            }, 10);
        }
    </script>
</body>
</html>
